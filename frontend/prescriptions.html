<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prescriptions – VitalSync</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <!-- jsPDF for proper PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .rx-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
    }

    .rx-card-header {
      background: linear-gradient(135deg, #0d6efd, #6c63ff);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rx-card-body {
      padding: 18px 20px;
    }

    .rx-section {
      background: #f8faff;
      border: 1px dashed #bfdbfe;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .rx-section .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      color: #0d6efd;
      margin-bottom: 6px;
    }

    /* Voice prescription styles (doctor only) */
    .voice-btn {
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.2s;
    }

    .voice-btn.idle {
      background: #eff6ff;
      color: #0d6efd;
    }

    .voice-btn.listening {
      background: #ef4444;
      color: #fff;
      animation: pulse-mic 1s infinite;
    }

    @keyframes pulse-mic {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
      }
    }

    /* Email modal */
    .email-preview-body {
      font-family: monospace;
      font-size: 0.82rem;
      white-space: pre-line;
      background: #f8faff;
      border-radius: 8px;
      padding: 14px;
      max-height: 300px;
      overflow-y: auto;
    }

    .download-btn {
      background: linear-gradient(135deg, #0d6efd, #6c63ff);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 7px 18px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
    }

    .download-btn:hover {
      opacity: 0.9;
    }

    .delete-btn {
      background: #ef4444;
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 7px 18px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
    }
    .delete-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <a href="#" class="sidebar-brand" id="sidebar-home">💙 Vital<span>Sync</span></a>
      <nav class="mt-2" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="d-flex align-items-center gap-2 mb-2">
          <div class="user-avatar" id="sidebar-avatar">U</div>
          <div>
            <div class="fw-600 text-white small" id="sidebar-user-name">User</div>
          </div>
        </div>
        <button class="btn btn-outline-danger btn-sm w-100 mt-1" onclick="logout()">
          <i class="fas fa-sign-out-alt me-1"></i> Logout
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h2><i class="fas fa-pills text-primary me-2"></i>Prescriptions</h2>
        <p id="page-subtitle">View all prescriptions and download as PDF.</p>
      </div>

      <div id="prescriptions-container">
        <div class="spinner-vs">
          <div class="spinner-border text-primary"></div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth(['patient', 'doctor']);
    populateSidebarUser();
    const user = getUser();
    const { jsPDF } = window.jspdf;

    // ── Sidebar ──────────────────────────────────────────────
    const nav = document.getElementById('sidebar-nav');
    document.getElementById('sidebar-home').href = user.role === 'doctor' ? 'doctor-dashboard.html' : 'patient-dashboard.html';
    if (user.role === 'doctor') {
      document.getElementById('page-subtitle').textContent = 'Review and manage patient prescriptions. Use voice input to dictate.';
      nav.innerHTML = `
            <a href="doctor-dashboard.html"  class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="patient-list.html"      class="nav-link"><i class="fas fa-users"></i> My Patients</a>
            <a href="medical-records.html"   class="nav-link"><i class="fas fa-file-medical"></i> Medical Records</a>
            <a href="prescriptions.html"     class="nav-link active"><i class="fas fa-pills"></i> Prescriptions</a>`;
    } else {
      nav.innerHTML = `
            <a href="patient-dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="add-health-data.html"   class="nav-link"><i class="fas fa-heartbeat"></i> Add Vitals</a>
            <a href="medical-records.html"   class="nav-link"><i class="fas fa-file-medical"></i> Medical Records</a>
            <a href="book-appointment.html"  class="nav-link"><i class="fas fa-calendar-plus"></i> Book Appointment</a>
            <a href="prescriptions.html"     class="nav-link active"><i class="fas fa-pills"></i> Prescriptions</a>`;
    }

    // ── PDF Generation (jsPDF) ────────────────────────────────
    function downloadPDF(record) {
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const pageW = 210;
      const margin = 20;
      const contentW = pageW - margin * 2;
      let y = 0;

      // Header Background
      doc.setFillColor(13, 110, 253);
      doc.rect(0, 0, pageW, 45, 'F');

      // Logo / Title
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(22);
      doc.setTextColor(255, 255, 255);
      doc.text('VitalSync', margin, 18);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text('Health Management System', margin, 25);
      doc.setFontSize(12);
      doc.text('PRESCRIPTION REPORT', margin, 36);

      // Date on right
      doc.setFontSize(9);
      doc.text(`Date: ${new Date(record.date).toLocaleDateString('en-IN', { dateStyle: 'long' })}`, pageW - margin, 36, { align: 'right' });

      y = 55;

      // Doctor + Patient Info row
      doc.setFillColor(240, 248, 255);
      doc.roundedRect(margin, y, contentW, 28, 3, 3, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(13, 110, 253);
      doc.text('Physician', margin + 5, y + 9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(30, 30, 30);
      doc.setFontSize(9);
      doc.text(`Dr. ${record.doctor_name}`, margin + 5, y + 17);
      doc.text(record.specialization || '', margin + 5, y + 23);

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(13, 110, 253);
      doc.text('Patient', pageW / 2 + 5, y + 9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(30, 30, 30);
      doc.setFontSize(9);
      doc.text(user.name || 'Patient', pageW / 2 + 5, y + 17);

      y += 36;

      // Divider
      doc.setDrawColor(13, 110, 253);
      doc.setLineWidth(0.5);
      doc.line(margin, y, pageW - margin, y);
      y += 8;

      // Diagnosis
      doc.setFillColor(240, 253, 244);
      doc.roundedRect(margin, y, contentW, 18, 3, 3, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(21, 128, 61);
      doc.text('DIAGNOSIS', margin + 5, y + 7);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(30, 30, 30);
      doc.text(record.diagnosis || 'Not specified', margin + 5, y + 14);
      y += 24;

      // Prescription
      doc.setFillColor(255, 251, 235);
      const presLines = doc.splitTextToSize(record.prescription || 'No prescription provided.', contentW - 10);
      const presH = Math.max(25, presLines.length * 6 + 14);
      doc.roundedRect(margin, y, contentW, presH, 3, 3, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(146, 64, 14);
      doc.text('💊 PRESCRIPTION', margin + 5, y + 7);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(30, 30, 30);
      doc.text(presLines, margin + 5, y + 14);
      y += presH + 6;

      // Notes
      if (record.notes) {
        doc.setFillColor(248, 250, 255);
        const noteLines = doc.splitTextToSize(record.notes, contentW - 10);
        const noteH = Math.max(20, noteLines.length * 6 + 12);
        doc.roundedRect(margin, y, contentW, noteH, 3, 3, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.setTextColor(109, 40, 217);
        doc.text('DOCTOR NOTES', margin + 5, y + 7);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(30, 30, 30);
        doc.text(noteLines, margin + 5, y + 13);
        y += noteH + 6;
      }

      // Footer
      y = 270;
      doc.setFillColor(13, 110, 253);
      doc.rect(0, y, pageW, 27, 'F');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(255, 255, 255);
      doc.text('This is a computer-generated prescription from VitalSync Health Management System.', pageW / 2, y + 8, { align: 'center' });
      doc.text('Please follow all medication instructions carefully and consult your doctor for any concerns.', pageW / 2, y + 15, { align: 'center' });
      doc.text(`Generated: ${new Date().toLocaleString('en-IN')}`, pageW / 2, y + 22, { align: 'center' });

      doc.save(`VitalSync_Prescription_${new Date(record.date).toISOString().split('T')[0]}.pdf`);
      showToast('📄 PDF downloaded successfully!');
    }

    // ── Delete Prescription ───────────────────────────────────
    async function deletePrescription(recordId) {
      if (!confirm('Are you sure you want to delete this prescription? This will remove it for both you and the patient.')) return;
      
      const res = await apiFetch(`/records/${recordId}`, { method: 'DELETE' });
      if (res && res.ok) {
        showToast('Prescription deleted successfully!', 'success');
        loadPrescriptions(); // Refresh the list
      } else {
        showToast(res?.data?.message || 'Failed to delete prescription.', 'error');
      }
    }

    // ── Voice Input (Web Speech API) ──────────────────────────
    let recognition = null;
    function startVoice(targetId, btnId) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) { showToast('Voice input not supported in this browser.', 'warning'); return; }
      if (recognition) { recognition.stop(); recognition = null; return; }

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-IN';

      const btn = document.getElementById(btnId);
      const target = document.getElementById(targetId);
      btn.className = 'voice-btn listening';
      btn.title = 'Click to stop';
      showToast('🎤 Listening… speak the prescription.');

      let finalText = target.value;
      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) finalText += event.results[i][0].transcript + ' ';
          else interim = event.results[i][0].transcript;
        }
        target.value = finalText + interim;
      };
      recognition.onerror = () => { btn.className = 'voice-btn idle'; recognition = null; };
      recognition.onend = () => { btn.className = 'voice-btn idle'; recognition = null; showToast('🎤 Voice input stopped.'); };
      recognition.start();
    }

    // ── Load Prescriptions ────────────────────────────────────
    async function loadPrescriptions() {
      const container = document.getElementById('prescriptions-container');
      const res = await apiFetch('/records/my/all');
      if (!res || !res.ok) {
        container.innerHTML = '<p class="text-muted text-center py-4">Could not load prescriptions.</p>'; return;
      }
      const records = res.data.records.filter(r => r.prescription);
      if (records.length === 0) {
        container.innerHTML = `
                <div class="empty-state vs-card">
                    <i class="fas fa-prescription-bottle-alt" style="font-size:3rem;opacity:0.3;"></i>
                    <p class="mt-3 mb-1 fw-600">No Prescriptions Yet</p>
                    <p class="text-muted small">Prescriptions added by your doctor will appear here.</p>
                    <a href="book-appointment.html" class="btn btn-vs-primary btn-sm mt-2">Book an Appointment</a>
                </div>`;
        return;
      }

      container.innerHTML = `<div class="mb-3 text-muted small">${records.length} prescription(s) found</div>` +
        records.map((r, i) => `
                <div class="rx-card">
                    <div class="rx-card-header">
                        <div>
                            <span class="badge bg-white text-primary fw-700 me-2">Rx #${i + 1}</span>
                            <span class="fw-700">${r.diagnosis}</span>
                        </div>
                        <div style="font-size:0.8rem;opacity:0.85;">
                            <i class="fas fa-calendar me-1"></i>${new Date(r.date).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' })}
                        </div>
                    </div>
                    <div class="rx-card-body">
                        <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
                            <div class="d-flex align-items-center gap-2">
                                <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0d6efd,#6c63ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;">${r.doctor_name.charAt(0)}</div>
                                <div>
                                    <div class="fw-600 small">Dr. ${r.doctor_name}</div>
                                    <div class="text-muted" style="font-size:0.75rem;">${r.specialization}</div>
                                </div>
                            </div>
                        </div>

                        <div class="rx-section">
                            <div class="section-title"><i class="fas fa-pills me-1"></i>Prescription</div>
                            <div style="white-space:pre-line;font-size:0.9rem;">${r.prescription}</div>
                        </div>

                        ${r.notes ? `
                        <div class="rx-section">
                            <div class="section-title"><i class="fas fa-sticky-note me-1"></i>Doctor Notes</div>
                            <div style="font-size:0.88rem;">${r.notes}</div>
                        </div>` : ''}

                        <div class="d-flex gap-2 flex-wrap mt-2">
                            <button class="download-btn" onclick='downloadPDF(${JSON.stringify(r)})'>
                                <i class="fas fa-file-pdf me-1"></i>Download PDF
                            </button>
                            <button class="delete-btn ms-auto" onclick='deletePrescription(${r.id})'>
                                <i class="fas fa-trash me-1"></i>Delete
                            </button>
                        </div>
                    </div>
                </div>`).join('');
    }

    loadPrescriptions();
  </script>
</body>

</html>
