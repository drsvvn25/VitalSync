<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – VitalSync</title>
    <meta name="description" content="Create your VitalSync account as a patient or healthcare provider.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card" style="max-width:520px;">
            <div class="text-center mb-3">
                <a href="index.html" class="auth-logo d-block text-decoration-none">💙 Vital<span>Sync</span></a>
                <p class="text-muted small mt-1">Create Your Account</p>
            </div>

            <!-- Registration Title -->
            <div class="text-center mb-3">
                <h5 class="fw-700 mb-1">Join VitalSync</h5>
                <p class="text-muted small">Create your secure patient account</p>
            </div>

            <div id="alert-box" class="alert d-none" role="alert"></div>

            <form id="register-form" novalidate>
                <input type="hidden" id="role" value="patient">

                <div class="row g-2">
                    <div class="col-12">
                        <label class="form-label fw-500 small" for="name">Full Name *</label>
                        <input type="text" id="name" name="name" autocomplete="name" class="vs-form-control"
                            placeholder="Ananya Patel" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-500 small" for="email">Email *</label>
                        <input type="email" id="email" name="email" autocomplete="email" class="vs-form-control"
                            placeholder="you@email.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-500 small" for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" autocomplete="tel" class="vs-form-control"
                            placeholder="9876543210">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-500 small" for="password">Password *</label>
                        <input type="password" id="password" name="password" autocomplete="new-password"
                            class="vs-form-control" placeholder="Min 6 chars" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-500 small" for="confirm-password">Confirm Password *</label>
                        <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password"
                            class="vs-form-control" placeholder="Repeat password" required>
                    </div>

                    <!-- Patient-specific fields (Constant) -->
                    <div id="patient-fields">
                        <div class="row g-2 mt-0">
                            <div class="col-md-4">
                                <label class="form-label fw-500 small" for="age">Age</label>
                                <input type="number" id="age" name="age" autocomplete="off" class="vs-form-control"
                                    placeholder="25" min="1" max="120">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-500 small" for="gender">Gender</label>
                                <select id="gender" name="gender" autocomplete="sex" class="vs-form-control">
                                    <option value="">Select</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-500 small" for="blood_group">Blood Group</label>
                                <select id="blood_group" name="blood_group" autocomplete="off" class="vs-form-control">
                                    <option value="">Select</option>
                                    <option>A+</option>
                                    <option>A-</option>
                                    <option>B+</option>
                                    <option>B-</option>
                                    <option>AB+</option>
                                    <option>AB-</option>
                                    <option>O+</option>
                                    <option>O-</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-500 small" for="address">Address</label>
                                <input type="text" id="address" name="address" autocomplete="street-address"
                                    class="vs-form-control" placeholder="12 MG Road, Ahmedabad">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-vs-primary w-100 py-2 mt-3" id="register-btn">
                    <span id="btn-text">Create Account</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                </button>
            </form>

            <p class="text-center mt-3 small text-muted">
                Already have an account? <a href="login.html" class="text-primary fw-600">Sign in</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (isLoggedIn()) redirectByRole(getUser().role);

        const alertBox = document.getElementById('alert-box');
        const roleInput = document.getElementById('role');

        function showAlert(msg, type = 'danger') {
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = msg;
            alertBox.classList.remove('d-none');
        }


        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) { showAlert('Passwords do not match.'); return; }
            if (password.length < 6) { showAlert('Password must be at least 6 characters.'); return; }

            const role = roleInput.value;
            const body = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password, role,
            };
            if (role === 'patient') {
                body.age = document.getElementById('age').value;
                body.gender = document.getElementById('gender').value;
                body.blood_group = document.getElementById('blood_group').value;
                body.address = document.getElementById('address').value.trim();
            } else {
                body.specialization = document.getElementById('specialization').value;
                body.experience = document.getElementById('experience').value;
            }

            if (!body.name || !body.email) { showAlert('Name and Email are required.'); return; }
            if (role === 'doctor' && !body.specialization) { showAlert('Please select a specialization.'); return; }

            document.getElementById('btn-text').textContent = 'Creating…';
            document.getElementById('btn-spinner').classList.remove('d-none');
            alertBox.classList.add('d-none');

            try {
                const res = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify(body) });
                if (!res) return;
                if (res.ok) {
                    saveAuth(res.data.token, res.data.user);
                    showAlert('Account created! Redirecting…', 'success');
                    setTimeout(() => redirectByRole(res.data.user.role), 900);
                } else {
                    showAlert(res.data.message || 'Registration failed.');
                }
            } catch {
                showAlert('Server unreachable. Is the backend running?');
            } finally {
                document.getElementById('btn-text').textContent = 'Create Account';
                document.getElementById('btn-spinner').classList.add('d-none');
            }
        });
    </script>
</body>

</html>
