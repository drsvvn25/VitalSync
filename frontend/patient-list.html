<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient List – VitalSync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="doctor-dashboard.html" class="sidebar-brand">💙 Vital<span>Sync</span></a>
            <nav class="mt-2">
                <a href="doctor-dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
                <a href="patient-list.html" class="nav-link active"><i class="fas fa-users"></i> My Patients</a>
                <a href="medical-records.html?mode=doctor" class="nav-link"><i class="fas fa-file-medical"></i> Medical
                    Records</a>
                <a href="prescriptions.html" class="nav-link"><i class="fas fa-pills"></i> Prescriptions</a>
            </nav>
            <div class="sidebar-footer">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <div class="user-avatar" id="sidebar-avatar">D</div>
                    <div>
                        <div class="fw-600 text-white small" id="sidebar-user-name">Doctor</div>
                    </div>
                </div>
                <button class="btn btn-outline-danger btn-sm w-100 mt-1" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i> Logout
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h2><i class="fas fa-users text-primary me-2"></i>Patient List</h2>
                <p>All registered patients in the VitalSync system.</p>
            </div>

            <!-- Search -->
            <div class="vs-card mb-4">
                <div class="row g-2 align-items-center">
                    <div class="col-md-8">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" id="search-input" class="form-control"
                                placeholder="Search by name, email, blood group…" oninput="filterPatients()">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select id="gender-filter" class="vs-form-control" onchange="filterPatients()">
                            <option value="">All Genders</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- All patients (doctor sees all) -->
            <div class="vs-card">
                <div class="vs-card-header">
                    <h5><i class="fas fa-hospital-user me-2 text-primary"></i>All Registered Patients
                        <span class="badge bg-primary ms-2" id="total-count">0</span>
                    </h5>
                </div>
                <div class="table-responsive">
                    <table class="vs-table w-100">
                        <thead>
                            <tr>
                                <th>Patient</th>
                                <th>Age</th>
                                <th>Gender</th>
                                <th>Blood Group</th>
                                <th>Phone</th>
                                <th>Registered</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="patients-table-body">
                            <tr>
                                <td colspan="7" class="text-center text-muted py-3">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Vitals Modal -->
            <div class="modal fade" id="vitals-modal" tabindex="-1">
                <div class="modal-dialog modal-lg modal-dialog-scrollable">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title"><i class="fas fa-heartbeat text-danger me-2"></i>Patient Vitals
                                History</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body" id="vitals-modal-body">
                            <div class="spinner-vs">
                                <div class="spinner-border text-primary"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        requireAuth(['doctor']);
        populateSidebarUser();
        let allPatients = [];

        async function loadPatients() {
            const res = await apiFetch('/patient/all');
            const tbody = document.getElementById('patients-table-body');
            if (!res || !res.ok) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Failed to load patients.</td></tr>'; return; }
            allPatients = res.data.patients;
            renderPatients(allPatients);
        }

        function renderPatients(patients) {
            document.getElementById('total-count').textContent = patients.length;
            const tbody = document.getElementById('patients-table-body');
            if (patients.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No patients found.</td></tr>'; return;
            }
            tbody.innerHTML = patients.map(p => `
      <tr>
        <td>
          <div class="d-flex align-items-center gap-2">
            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0d6efd,#6c63ff);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0;">${p.name.charAt(0)}</div>
            <div><div class="fw-600 small">${p.name}</div><small class="text-muted">${p.email}</small></div>
          </div>
        </td>
        <td>${p.age || '--'}</td>
        <td>${p.gender || '--'}</td>
        <td><span class="badge bg-danger bg-opacity-10 text-danger">${p.blood_group || '--'}</span></td>
        <td>${p.phone || '--'}</td>
        <td><small class="text-muted">${new Date(p.created_at).toLocaleDateString('en-IN')}</small></td>
        <td>
          <button class="btn btn-vs-outline btn-sm me-1" onclick="showVitals(${p.patient_id},'${p.name}')"><i class="fas fa-heartbeat me-1"></i>Vitals</button>
          <a href="medical-records.html?patient_id=${p.patient_id}&mode=doctor" class="btn btn-vs-primary btn-sm"><i class="fas fa-file-medical me-1"></i>Records</a>
        </td>
      </tr>`).join('');
        }

        function filterPatients() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const g = document.getElementById('gender-filter').value;
            const filtered = allPatients.filter(p =>
                (!q || p.name.toLowerCase().includes(q) || p.email.toLowerCase().includes(q) || (p.blood_group || '').toLowerCase().includes(q)) &&
                (!g || p.gender === g)
            );
            renderPatients(filtered);
        }

        async function showVitals(patientId, name) {
            const modal = new bootstrap.Modal(document.getElementById('vitals-modal'));
            document.querySelector('#vitals-modal .modal-title').innerHTML = `<i class="fas fa-heartbeat text-danger me-2"></i>${name} – Vitals History`;
            document.getElementById('vitals-modal-body').innerHTML = '<div class="spinner-vs"><div class="spinner-border text-primary"></div></div>';
            modal.show();
            const res = await apiFetch(`/vitals/${patientId}`);
            if (!res || !res.ok || res.data.vitals.length === 0) {
                document.getElementById('vitals-modal-body').innerHTML = '<p class="text-muted text-center py-3">No vitals recorded for this patient.</p>'; return;
            }
            document.getElementById('vitals-modal-body').innerHTML = `
      <div class="table-responsive">
        <table class="vs-table w-100">
          <thead><tr><th>Date</th><th>Heart Rate</th><th>Blood Pressure</th><th>Oxygen</th><th>Temperature</th></tr></thead>
          <tbody>${res.data.vitals.map(v => `
            <tr>
              <td>${new Date(v.record_date).toLocaleString('en-IN')}</td>
              <td><span class="${v.heart_rate < 60 || v.heart_rate > 100 ? 'text-danger fw-600' : ''}">${v.heart_rate} bpm</span></td>
              <td>${v.blood_pressure || '--'}</td>
              <td><span class="${v.oxygen_level < 95 ? 'text-danger fw-600' : 'text-success'}">${v.oxygen_level}%</span></td>
              <td><span class="${v.temperature > 37.2 ? 'text-danger fw-600' : ''}">${v.temperature}°C</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
        }
        loadPatients();
    </script>
</body>

</html>
